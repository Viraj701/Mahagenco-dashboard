version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mahagenco-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres-dev-password
      POSTGRES_DB: mahagenco_dashboard
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mahagenco-network

  redis:
    image: redis:7-alpine
    container_name: mahagenco-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mahagenco-network

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
      args:
        NODE_ENV: development
    container_name: mahagenco-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres-dev-password@postgres:5432/mahagenco_dashboard
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-change-in-production
      JWT_EXPIRE: 7d
      LOG_LEVEL: debug
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/node_modules:/app/node_modules
    command: npm run dev
    networks:
      - mahagenco-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.frontend
      args:
        NODE_ENV: development
    container_name: mahagenco-frontend
    environment:
      NODE_ENV: development
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_WS_URL: ws://localhost:5000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/node_modules:/app/node_modules
    command: npm start
    depends_on:
      - backend
    networks:
      - mahagenco-network

  nginx:
    image: nginx:latest
    container_name: mahagenco-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - mahagenco-network

  adminer:
    image: adminer:latest
    container_name: mahagenco-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - mahagenco-network
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  mahagenco-network:
    driver: bridge
